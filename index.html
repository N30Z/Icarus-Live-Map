<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Icarus Live Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0f14;
      color: #c8d0e0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ─────────────────────────────────────────────── */
    #header {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 8px 16px;
      background: #13161f;
      border-bottom: 1px solid #2a2f3d;
      flex-shrink: 0;
      z-index: 1000;
    }
    #header h1 {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: #7eb8f7;
    }
    #player-count { font-size: 12px; color: #6b7280; }
    #status {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #6b7280;
    }
    #status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #22c55e;
      transition: background .3s;
    }
    #status-dot.stale   { background: #ef4444; }
    #status-dot.loading { background: #f59e0b; animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    /* ── Map ─────────────────────────────────────────────────── */
    #map { flex: 1; background: #0d1117; }

    /* ── Player tooltip ──────────────────────────────────────── */
    .leaflet-tooltip.player-label {
      background: rgba(13,15,20,.85);
      border: 1px solid #2a3a55;
      border-radius: 4px;
      color: #e2e8f4;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .04em;
      padding: 2px 6px;
      white-space: nowrap;
      backdrop-filter: blur(4px);
      pointer-events: none;
    }
    .leaflet-tooltip.player-label::before { display: none; }

    /* ── Coord bar ───────────────────────────────────────────── */
    #coords {
      position: absolute;
      bottom: 6px; right: 10px;
      font-size: 11px; color: #4a5568;
      z-index: 999; pointer-events: none;
    }

    /* ── Player sidebar ──────────────────────────────────────── */
    #sidebar {
      position: absolute;
      top: 48px; right: 10px;
      width: 210px;
      background: rgba(13,15,20,.88);
      border: 1px solid #2a2f3d;
      border-radius: 6px;
      backdrop-filter: blur(6px);
      z-index: 900;
      overflow: hidden;
    }
    #sidebar-title {
      padding: 7px 12px;
      font-size: 11px; font-weight: 600;
      letter-spacing: .08em; text-transform: uppercase;
      color: #4b6fa8;
      border-bottom: 1px solid #1e2535;
    }
    #player-list { padding: 4px 0; }
    .player-item {
      padding: 6px 12px;
      cursor: pointer;
      transition: background .15s;
    }
    .player-item:hover { background: #1a1f2e; }
    .player-item .name { font-size: 13px; font-weight: 600; color: #c8d0e0; }
    .player-item .coords-text { font-size: 10px; color: #4a5568; margin-top: 1px; }
    .player-item .online-dot {
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      margin-right: 5px;
      vertical-align: middle;
    }

    /* ── Leaflet layer control dark theme ────────────────────── */
    .leaflet-control-layers {
      background: rgba(13,15,20,.92) !important;
      border: 1px solid #2a2f3d !important;
      border-radius: 6px !important;
      color: #c8d0e0 !important;
    }
    .leaflet-control-layers-toggle {
      background-color: #13161f !important;
    }
    .leaflet-control-layers-list { padding: 4px 8px; }
    .leaflet-control-layers label { font-size: 12px; color: #c8d0e0; cursor: pointer; }
    .leaflet-control-layers-separator { border-top-color: #2a2f3d; }

    /* ── Ore legend / filter ─────────────────────────────────── */
    #legend {
      position: absolute;
      bottom: 30px; left: 10px;
      background: rgba(13,15,20,.88);
      border: 1px solid #2a2f3d;
      border-radius: 6px;
      padding: 8px 10px;
      z-index: 900;
      font-size: 11px;
      display: none;
    }
    #legend-title {
      font-size: 10px; font-weight: 600;
      letter-spacing: .08em; text-transform: uppercase;
      color: #4b6fa8; margin-bottom: 5px;
    }
    .legend-row {
      display: flex; align-items: center; gap: 6px; margin: 2px 0;
      cursor: pointer; user-select: none;
    }
    .legend-row:hover { color: #fff; }
    .legend-row.disabled { opacity: .35; }
    .legend-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,.25);
      flex-shrink: 0;
    }
    .legend-check {
      width: 12px; height: 12px;
      accent-color: #7eb8f7;
      margin: 0;
      cursor: pointer;
    }

    /* ── Settings panel ─────────────────────────────────────── */
    #settings-panel {
      position: absolute;
      top: 88px; left: 100px;
      width: 220px;
      background: rgba(13,15,20,.92);
      border: 1px solid #2a2f3d;
      border-radius: 6px;
      backdrop-filter: blur(6px);
      z-index: 900;
      overflow: hidden;
      display: none;
    }
    #settings-title {
      padding: 7px 12px;
      font-size: 11px; font-weight: 600;
      letter-spacing: .08em; text-transform: uppercase;
      color: #4b6fa8;
      border-bottom: 1px solid #1e2535;
    }
    #settings-body { padding: 8px 12px; }
    .setting-group { margin-bottom: 8px; }
    .setting-group label {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 12px; color: #c8d0e0; margin-bottom: 3px;
    }
    .setting-group label span.val { font-size: 10px; color: #6b7280; min-width: 28px; text-align: right; }
    .setting-group input[type=range] {
      width: 100%; height: 4px;
      -webkit-appearance: none; appearance: none;
      background: #2a2f3d; border-radius: 2px; outline: none;
    }
    .setting-group input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 12px; height: 12px;
      border-radius: 50%; background: #7eb8f7; cursor: pointer;
    }
    #btn-settings {
      position: absolute;
      top: 60px; left: 100px;
      z-index: 901;
      background: rgba(13,15,20,.92);
      border: 1px solid #2a2f3d;
      border-radius: 4px;
      color: #c8d0e0;
      font-size: 13px;
      padding: 5px 10px;
      cursor: pointer;
    }
    #btn-settings:hover { background: #1a1f2e; }

    /* ── Highlight Exotics button ───────────────────────────── */
    #btn-exotics {
      position: absolute;
      top: 126px; left: 10px;
      z-index: 901;
      background: rgba(13,15,20,.92);
      border: 1px solid #2a2f3d;
      border-radius: 4px;
      color: #cc22cc;
      font-size: 12px; font-weight: 600;
      padding: 5px 10px;
      cursor: pointer;
    }
    #btn-exotics:hover { background: #1a1f2e; }
    #btn-exotics.active {
      background: #cc22cc;
      color: #fff;
      border-color: #cc22cc;
    }
  </style>
</head>
<body>

<div id="header">
  <h1>Icarus Live Map</h1>
  <span id="player-count">– players online</span>
  <div id="status">
    <div id="status-dot" class="loading"></div>
    <span id="status-text">connecting…</span>
  </div>
</div>

<div id="map"></div>
<div id="coords"></div>

<div id="sidebar">
  <div id="sidebar-title">Players</div>
  <div id="player-list"></div>
</div>

<div id="legend">
  <div id="legend-title">Ore Filter</div>
  <div id="legend-rows"></div>
</div>

<button id="btn-settings">Settings</button>
<button id="btn-exotics">Highlight Exotics</button>

<div id="settings-panel">
  <div id="settings-title">Settings</div>
  <div id="settings-body">
    <div class="setting-group">
      <label>Players <span class="val" id="opacity-players-val">85%</span></label>
      <input type="range" min="0" max="100" value="85" id="opacity-players">
    </div>
    <div class="setting-group">
      <label>Deposits <span class="val" id="opacity-deposits-val">80%</span></label>
      <input type="range" min="0" max="100" value="80" id="opacity-deposits">
    </div>
    <div class="setting-group">
      <label>Caves <span class="val" id="opacity-caves-val">70%</span></label>
      <input type="range" min="0" max="100" value="70" id="opacity-caves">
    </div>
    <div class="setting-group">
      <label>Geysers <span class="val" id="opacity-geysers-val">75%</span></label>
      <input type="range" min="0" max="100" value="75" id="opacity-geysers">
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ═══════════════════════════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════════════════════════

const MAP_IMAGE    = 'map.jpg';
const MAP_MIN      = -4096;
const MAP_MAX      =  4096;
const Y_SIGN       = -1;
const POLL_INTERVAL = 5000;

const PLAYER_COLOURS = [
  '#60a5fa', '#34d399', '#f87171', '#fbbf24',
  '#a78bfa', '#fb923c', '#38bdf8', '#4ade80',
];

const ORE_COLOR = {
  Iron:      '#a0a0a0',
  Coal:      '#6b6b6b',
  Copper:    '#cd7f32',
  Gold:      '#ffd700',
  Platinum:  '#d0d0d0',
  Titanium:  '#4a9ece',
  Aluminium: '#7fb8d8',
  Silicon:   '#8899bb',
  Oxite:     '#00d4ff',
  Sulfur:    '#d4d400',
  Salt:      '#f0eee8',
  Stone:     '#966f50',
  Exotic:    '#cc22cc',
};

// ═══════════════════════════════════════════════════════════════
//  MAP SETUP
// ═══════════════════════════════════════════════════════════════

const bounds = [[MAP_MIN, MAP_MIN], [MAP_MAX, MAP_MAX]];

const map = L.map('map', {
  crs: L.CRS.Simple,
  minZoom: -4, maxZoom: 5,
  zoomSnap: 0.5, zoomDelta: 0.5,
  zoomControl: false,
  maxBounds: [[MAP_MIN * 1.1, MAP_MIN * 1.1], [MAP_MAX * 1.1, MAP_MAX * 1.1]],
  maxBoundsViscosity: 0.8,
});

L.control.zoom({ position: 'topleft' }).addTo(map);
L.imageOverlay(MAP_IMAGE, bounds, { errorOverlayUrl: '' }).addTo(map);
map.fitBounds(bounds);

map.on('mousemove', e => {
  const x = e.latlng.lng.toFixed(0);
  const y = (e.latlng.lat * Y_SIGN).toFixed(0);
  document.getElementById('coords').textContent = `X ${x} m   Y ${y} m`;
});

// ═══════════════════════════════════════════════════════════════
//  LAYER GROUPS
// ═══════════════════════════════════════════════════════════════

const playerLayer  = L.layerGroup().addTo(map);
const enzymeLayer  = L.layerGroup().addTo(map);
const oilLayer     = L.layerGroup().addTo(map);
const caveLayer    = L.layerGroup().addTo(map);
const depositLayer = L.layerGroup();   // off by default

L.control.layers({}, {
  'Enzyme Geysers': enzymeLayer,
  'Oil Geysers':    oilLayer,
  'Caves':          caveLayer,
  'Deposits':       depositLayer,
}, { collapsed: true, position: 'topleft' }).addTo(map);

// Show ore legend only while deposits layer is visible
map.on('overlayadd',    e => { if (e.layer === depositLayer) showLegend(true);  });
map.on('overlayremove', e => { if (e.layer === depositLayer) showLegend(false); });

// ═══════════════════════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════════════════════

function toLatLng(x_m, y_m) { return [y_m * Y_SIGN, x_m]; }

function yawToCompass(yaw) {
  // UE4 yaw: 0 = East, 90 = North, ±180 = West, -90 = South
  const bearing = ((90 - yaw) % 360 + 360) % 360;
  const dirs = ['N','NNE','NE','ENE','E','ESE','SE','SSE',
                'S','SSW','SW','WSW','W','WNW','NW','NNW'];
  return dirs[Math.round(bearing / 22.5) % 16];
}

function remainingLabel(r) {
  if (r === null || r === undefined) return 'Full';
  if (r <= 0) return 'Depleted';
  return 'Partial';
}

// ═══════════════════════════════════════════════════════════════
//  ORE FILTER (legend with checkboxes)
// ═══════════════════════════════════════════════════════════════

const oreEnabled = {};
for (const ore of Object.keys(ORE_COLOR)) oreEnabled[ore] = true;

// Per-ore sub-layers: each ore type gets its own layerGroup inside depositLayer
const oreSubLayers = {};
for (const ore of Object.keys(ORE_COLOR)) {
  oreSubLayers[ore] = L.layerGroup().addTo(depositLayer);
}

(function buildLegend() {
  const rows = document.getElementById('legend-rows');
  for (const [ore, color] of Object.entries(ORE_COLOR)) {
    const row = document.createElement('div');
    row.className = 'legend-row';
    const cb = document.createElement('input');
    cb.type = 'checkbox'; cb.checked = true; cb.className = 'legend-check';
    cb.dataset.ore = ore;
    cb.addEventListener('change', () => toggleOre(ore, cb.checked));
    const dot = document.createElement('div');
    dot.className = 'legend-dot';
    dot.style.background = color;
    const span = document.createElement('span');
    span.textContent = ore;
    row.appendChild(cb);
    row.appendChild(dot);
    row.appendChild(span);
    // clicking the row toggles the checkbox
    row.addEventListener('click', e => { if (e.target !== cb) { cb.checked = !cb.checked; toggleOre(ore, cb.checked); } });
    rows.appendChild(row);
  }
})();

function toggleOre(ore, visible) {
  oreEnabled[ore] = visible;
  if (visible) {
    if (!depositLayer.hasLayer(oreSubLayers[ore])) depositLayer.addLayer(oreSubLayers[ore]);
  } else {
    depositLayer.removeLayer(oreSubLayers[ore]);
  }
  // update legend row styling
  document.querySelectorAll('.legend-row').forEach(row => {
    const cb = row.querySelector('.legend-check');
    if (cb) row.classList.toggle('disabled', !cb.checked);
  });
}

function showLegend(visible) {
  document.getElementById('legend').style.display = visible ? 'block' : 'none';
}

// ═══════════════════════════════════════════════════════════════
//  SETTINGS PANEL — opacity sliders
// ═══════════════════════════════════════════════════════════════

const opacityState = { players: 0.85, deposits: 0.80, caves: 0.70, geysers: 0.75 };

document.getElementById('btn-settings').addEventListener('click', () => {
  const p = document.getElementById('settings-panel');
  p.style.display = p.style.display === 'none' ? 'block' : 'none';
});

['players','deposits','caves','geysers'].forEach(key => {
  const slider = document.getElementById('opacity-' + key);
  const valEl  = document.getElementById('opacity-' + key + '-val');
  slider.addEventListener('input', () => {
    const v = slider.value / 100;
    opacityState[key] = v;
    valEl.textContent = slider.value + '%';
    applyOpacity(key, v);
  });
});

function applyOpacity(category, opacity) {
  let layer;
  if (category === 'players')  layer = playerLayer;
  else if (category === 'deposits') layer = depositLayer;
  else if (category === 'caves')    layer = caveLayer;
  else if (category === 'geysers')  { applyOpacityToLayer(enzymeLayer, opacity); applyOpacityToLayer(oilLayer, opacity); return; }
  if (layer) applyOpacityToLayer(layer, opacity);
}

function applyOpacityToLayer(layer, opacity) {
  layer.eachLayer(sub => {
    if (sub.eachLayer) {
      // sub-layerGroup (ore sub-layers)
      sub.eachLayer(m => setMarkerOpacity(m, opacity));
    } else {
      setMarkerOpacity(sub, opacity);
    }
  });
}

function setMarkerOpacity(marker, opacity) {
  // skip exotic-highlighted markers
  if (marker._exoticHighlight) return;
  if (marker.setStyle) marker.setStyle({ fillOpacity: opacity, opacity: opacity });
}

// ═══════════════════════════════════════════════════════════════
//  HIGHLIGHT EXOTICS
// ═══════════════════════════════════════════════════════════════

let exoticHighlightOn = false;

document.getElementById('btn-exotics').addEventListener('click', () => {
  exoticHighlightOn = !exoticHighlightOn;
  document.getElementById('btn-exotics').classList.toggle('active', exoticHighlightOn);
  applyExoticHighlight();
});

function applyExoticHighlight() {
  if (!oreSubLayers.Exotic) return;
  oreSubLayers.Exotic.eachLayer(m => {
    if (exoticHighlightOn) {
      m._exoticHighlight = true;
      m.setStyle({ radius: 8, fillOpacity: 1, opacity: 1, weight: 3, color: '#ff66ff', fillColor: '#cc22cc' });
      m.bringToFront();
    } else {
      m._exoticHighlight = false;
      m.setStyle({ radius: 4, fillOpacity: opacityState.deposits, opacity: opacityState.deposits, weight: 1, color: 'rgba(255,255,255,0.3)', fillColor: '#cc22cc' });
    }
  });
}

// ═══════════════════════════════════════════════════════════════
//  PLAYER LAYER
// ═══════════════════════════════════════════════════════════════

const playerState = {};
let colourIdx = 0;

function getColour(id) {
  if (!playerState[id]) {
    playerState[id] = { colour: PLAYER_COLOURS[colourIdx++ % PLAYER_COLOURS.length] };
  }
  return playerState[id].colour;
}

function updatePlayers(players) {
  const online = players.filter(p => p.online);

  document.getElementById('player-count').textContent =
    `${online.length} / ${players.length} online`;

  const seen = new Set();

  online.forEach(p => {
    seen.add(p.steam_id);
    const ll = toLatLng(p.x_m, p.y_m);

    if (playerState[p.steam_id]?.marker) {
      playerState[p.steam_id].marker.setLatLng(ll);
    } else {
      const colour = getColour(p.steam_id);
      const marker = L.circleMarker(ll, {
        radius: 7, color: colour, fillColor: colour,
        fillOpacity: opacityState.players, weight: 2,
        opacity: opacityState.players,
      }).addTo(playerLayer);
      marker.bindTooltip(p.character_name, {
        permanent: true, direction: 'top',
        offset: [0, -10], className: 'player-label',
      });
      playerState[p.steam_id] = playerState[p.steam_id] || {};
      playerState[p.steam_id].marker = marker;
    }
  });

  // Remove markers for players who went offline
  for (const id of Object.keys(playerState)) {
    if (!seen.has(id) && playerState[id]?.marker) {
      playerState[id].marker.remove();
      playerState[id].marker = null;
    }
  }

  // Sidebar
  const list = document.getElementById('player-list');
  list.innerHTML = '';
  players.forEach(p => {
    const item = document.createElement('div');
    item.className = 'player-item';
    const colour   = getColour(p.steam_id);
    const dot      = `<span class="online-dot" style="background:${colour}"></span>`;
    const coordTxt = p.online
      ? `X ${p.x_m} m  Y ${p.y_m} m  Z ${p.z_m} m`
      : 'offline';
    item.innerHTML = `<div class="name">${dot}${p.character_name}</div>
                      <div class="coords-text">${coordTxt}</div>`;
    if (p.online && playerState[p.steam_id]?.marker) {
      item.addEventListener('click', () => {
        map.setView(toLatLng(p.x_m, p.y_m), 1, { animate: true });
        playerState[p.steam_id].marker.openTooltip();
      });
    }
    list.appendChild(item);
  });
}

// ═══════════════════════════════════════════════════════════════
//  STATIC POI LAYERS  (redrawn only when server version changes)
// ═══════════════════════════════════════════════════════════════

function drawStaticPOIs(data) {
  enzymeLayer.clearLayers();
  oilLayer.clearLayers();
  caveLayer.clearLayers();
  // Clear ore sub-layers (not depositLayer itself — it holds the sub-layerGroups)
  for (const ore of Object.keys(oreSubLayers)) oreSubLayers[ore].clearLayers();

  // ── Enzyme geysers ──
  (data.geysers?.enzyme || []).forEach(g => {
    const tip = `<b>Enzyme Geyser</b><br>`
              + `Horde: ${g.horde || '?'}<br>`
              + `Completions: ${g.completions ?? 0}<br>`
              + `Active: ${g.active ? 'yes' : 'no'}`;
    L.circleMarker(toLatLng(g.x_m, g.y_m), {
      radius: 7, color: '#16a34a', fillColor: '#22c55e',
      fillOpacity: 0.75, weight: 2,
    }).bindTooltip(tip).addTo(enzymeLayer);
  });

  // ── Oil geysers ──
  (data.geysers?.oil || []).forEach(g => {
    const tip = `<b>Oil Geyser</b><br>Active: ${g.active ? 'yes' : 'no'}`;
    L.circleMarker(toLatLng(g.x_m, g.y_m), {
      radius: 7, color: '#78350f', fillColor: '#b45309',
      fillOpacity: 0.75, weight: 2,
    }).bindTooltip(tip).addTo(oilLayer);
  });

  // ── Caves ──
  (data.caves || []).forEach(c => {
    const facing  = c.yaw != null ? `  •  Facing ${yawToCompass(c.yaw)} (${c.yaw}°)` : '';
    const mined   = c.fully_mined ? '  •  <b>Mined out</b>' : '';
    const tip     = `<b>Cave Entrance</b>${mined}${facing}`;
    L.circleMarker(toLatLng(c.x_m, c.y_m), {
      radius: 5, color: '#9ca3af', fillColor: '#374151',
      fillOpacity: 0.7, weight: 2,
    }).bindTooltip(tip).addTo(caveLayer);
  });

  // ── Resource deposits ── (into per-ore sub-layers)
  (data.deposits || []).forEach(d => {
    const color   = ORE_COLOR[d.ore] || '#888';
    const status  = remainingLabel(d.remaining);
    const catStr  = d.category === 'cave' ? 'Cave' : d.category === 'meta' ? 'Meta' : 'Surface';
    const tip     = `<b>${d.ore}</b> [${catStr}]<br>Status: ${status}`;
    const sub     = oreSubLayers[d.ore];
    const target  = sub || depositLayer;
    L.circleMarker(toLatLng(d.x_m, d.y_m), {
      radius: 4, color: 'rgba(255,255,255,0.3)', fillColor: color,
      fillOpacity: opacityState.deposits, weight: 1,
    }).bindTooltip(tip).addTo(target);
  });

  // Apply current opacity to newly drawn layers
  applyOpacityToLayer(enzymeLayer, opacityState.geysers);
  applyOpacityToLayer(oilLayer, opacityState.geysers);
  applyOpacityToLayer(caveLayer, opacityState.caves);
  // Re-apply exotic highlight if active
  if (exoticHighlightOn) applyExoticHighlight();
}

// ═══════════════════════════════════════════════════════════════
//  POLLING
// ═══════════════════════════════════════════════════════════════

let lastVersion = -1;

function setStatus(state, text) {
  const dot  = document.getElementById('status-dot');
  const span = document.getElementById('status-text');
  dot.className = state === 'loading' ? 'loading' : state === 'ok' ? '' : 'stale';
  span.textContent = text;
}

function poll() {
  setStatus('loading', 'updating…');

  fetch('/api/state?_=' + Date.now())
    .then(r => {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    })
    .then(data => {
      // Redraw static POIs only when the server re-parsed the save file
      if (data.version !== lastVersion) {
        drawStaticPOIs(data);
        lastVersion = data.version;
      }
      updatePlayers(data.players || []);

      const t = new Date().toLocaleTimeString();
      setStatus('ok', `updated ${t}`);
    })
    .catch(err => {
      console.error(err);
      setStatus('error', 'failed – retrying');
    });
}

poll();
setInterval(poll, POLL_INTERVAL);
</script>
