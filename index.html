<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Icarus Live Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0f14;
      color: #c8d0e0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ─────────────────────────────────────────────── */
    #header {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 8px 16px;
      background: #13161f;
      border-bottom: 1px solid #2a2f3d;
      flex-shrink: 0;
      z-index: 1000;
    }
    #header h1 {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: #7eb8f7;
    }
    #player-count {
      font-size: 12px;
      color: #6b7280;
    }
    #status {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #6b7280;
    }
    #status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #22c55e;
      transition: background .3s;
    }
    #status-dot.stale { background: #ef4444; }
    #status-dot.loading { background: #f59e0b; animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    /* ── Map ─────────────────────────────────────────────────── */
    #map {
      flex: 1;
      background: #0d1117;
    }

    /* ── Player Tooltip ──────────────────────────────────────── */
    .leaflet-tooltip.player-label {
      background: rgba(13,15,20,.85);
      border: 1px solid #2a3a55;
      border-radius: 4px;
      color: #e2e8f4;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .04em;
      padding: 2px 6px;
      white-space: nowrap;
      backdrop-filter: blur(4px);
      pointer-events: none;
    }
    .leaflet-tooltip.player-label::before { display: none; }

    /* ── Coords bar ──────────────────────────────────────────── */
    #coords {
      position: absolute;
      bottom: 6px;
      right: 10px;
      font-size: 11px;
      color: #4a5568;
      z-index: 999;
      pointer-events: none;
    }

    /* ── Player sidebar (right panel) ───────────────────────── */
    #sidebar {
      position: absolute;
      top: 48px;
      right: 10px;
      width: 210px;
      background: rgba(13,15,20,.88);
      border: 1px solid #2a2f3d;
      border-radius: 6px;
      backdrop-filter: blur(6px);
      z-index: 900;
      overflow: hidden;
    }
    #sidebar-title {
      padding: 7px 12px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: #4b6fa8;
      border-bottom: 1px solid #1e2535;
    }
    #player-list { padding: 4px 0; }
    .player-item {
      padding: 6px 12px;
      cursor: pointer;
      transition: background .15s;
    }
    .player-item:hover { background: #1a1f2e; }
    .player-item .name {
      font-size: 13px;
      font-weight: 600;
      color: #c8d0e0;
    }
    .player-item .coords-text {
      font-size: 10px;
      color: #4a5568;
      margin-top: 1px;
    }
    .player-item .online-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      margin-right: 5px;
      vertical-align: middle;
    }
  </style>
</head>
<body>

<div id="header">
  <h1>Icarus Live Map</h1>
  <span id="player-count">– players online</span>
  <div id="status">
    <div id="status-dot" class="loading"></div>
    <span id="status-text">connecting…</span>
  </div>
</div>

<div id="map"></div>

<div id="coords"></div>

<div id="sidebar">
  <div id="sidebar-title">Players</div>
  <div id="player-list"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ═══════════════════════════════════════════════════════════════
//  CONFIG — adjust if markers appear in wrong positions
// ═══════════════════════════════════════════════════════════════

// Map image file (place in the same folder as this HTML)
const MAP_IMAGE = 'map.jpg';

// Prospect bounds in meters.
// Standard Styx/Olympus D-tier prospect: 8 192 × 8 192 m
// Open-world / E-tier: may be larger.  Adjust until the grid fits.
const MAP_MIN = -4096;   // west / south edge  (meters)
const MAP_MAX =  4096;   // east / north edge  (meters)

// UE4 → Leaflet coordinate transform.
// Leaflet Simple CRS:  lat = Y (positive = up/north)
//                      lng = X (positive = right/east)
// In UE4 the Y-axis typically runs north, but some prospects are
// rotated.  If players appear mirrored, flip Y_SIGN to -1.
const Y_SIGN = -1;   // -1 flips Y (UE4 south-positive → north-positive)

// How often to poll players.json (milliseconds)
const POLL_INTERVAL = 5000;

// Player dot colours (cycles through these)
const COLOURS = [
  '#60a5fa', '#34d399', '#f87171', '#fbbf24',
  '#a78bfa', '#fb923c', '#38bdf8', '#4ade80',
];

// ═══════════════════════════════════════════════════════════════
//  MAP SETUP
// ═══════════════════════════════════════════════════════════════

const bounds = [[MAP_MIN, MAP_MIN], [MAP_MAX, MAP_MAX]];

const map = L.map('map', {
  crs: L.CRS.Simple,
  minZoom: -4,
  maxZoom:  5,
  zoomSnap: 0.5,
  zoomDelta: 0.5,
  maxBounds: [[MAP_MIN * 1.1, MAP_MIN * 1.1], [MAP_MAX * 1.1, MAP_MAX * 1.1]],
  maxBoundsViscosity: 0.8,
});

// Background image
L.imageOverlay(MAP_IMAGE, bounds, { errorOverlayUrl: '' }).addTo(map);
map.fitBounds(bounds);

// Coordinate display on mousemove
map.on('mousemove', e => {
  const x = e.latlng.lng.toFixed(0);
  const y = (e.latlng.lat * Y_SIGN).toFixed(0);   // show raw UE4 Y
  document.getElementById('coords').textContent = `X ${x} m   Y ${y} m`;
});

// ═══════════════════════════════════════════════════════════════
//  PLAYER LAYER
// ═══════════════════════════════════════════════════════════════

const playerLayer  = L.layerGroup().addTo(map);
const playerState  = {};   // steam_id → { marker, colour }
let   colourIndex  = 0;

function toLatLng(x_m, y_m) {
  return [y_m * Y_SIGN, x_m];
}

function getColour(steam_id) {
  if (!playerState[steam_id]) {
    playerState[steam_id] = { colour: COLOURS[colourIndex % COLOURS.length] };
    colourIndex++;
  }
  return playerState[steam_id].colour;
}

function buildPlayerMarker(p) {
  const colour = getColour(p.steam_id);
  const latlng = toLatLng(p.x_m, p.y_m);

  const marker = L.circleMarker(latlng, {
    radius: 7,
    color: colour,
    fillColor: colour,
    fillOpacity: 0.85,
    weight: 2,
  }).addTo(playerLayer);

  marker.bindTooltip(p.character_name, {
    permanent: true,
    direction: 'top',
    offset: [0, -10],
    className: 'player-label',
  });

  return marker;
}

// ═══════════════════════════════════════════════════════════════
//  POLLING
// ═══════════════════════════════════════════════════════════════

let lastUpdate = null;

function setStatus(state, text) {
  const dot  = document.getElementById('status-dot');
  const span = document.getElementById('status-text');
  dot.className = 'loading' === state ? 'loading' :
                  'ok'      === state ? ''        : 'stale';
  span.textContent = text;
}

function updateSidebar(players) {
  const list = document.getElementById('player-list');
  list.innerHTML = '';
  players.forEach(p => {
    const item = document.createElement('div');
    item.className = 'player-item';

    const colour = getColour(p.steam_id);
    const dot    = `<span class="online-dot" style="background:${colour}"></span>`;

    const coordText = p.online
      ? `X ${p.x_m} m  Y ${p.y_m} m  Z ${p.z_m} m`
      : 'offline';

    item.innerHTML = `
      <div class="name">${dot}${p.character_name}</div>
      <div class="coords-text">${coordText}</div>
    `;

    if (p.online && playerState[p.steam_id]?.marker) {
      item.addEventListener('click', () => {
        const ll = toLatLng(p.x_m, p.y_m);
        map.setView(ll, 1, { animate: true });
        playerState[p.steam_id].marker.openTooltip();
      });
    }

    list.appendChild(item);
  });
}

function fetchPlayers() {
  setStatus('loading', 'updating…');

  fetch('players.json?_=' + Date.now())
    .then(r => {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    })
    .then(data => {
      const players = data.players || [];
      const online  = players.filter(p => p.online);

      document.getElementById('player-count').textContent =
        `${online.length} / ${players.length} online`;

      const seen = new Set();

      online.forEach(p => {
        seen.add(p.steam_id);
        const latlng = toLatLng(p.x_m, p.y_m);

        if (playerState[p.steam_id]?.marker) {
          playerState[p.steam_id].marker.setLatLng(latlng);
        } else {
          const marker = buildPlayerMarker(p);
          playerState[p.steam_id] = playerState[p.steam_id] || {};
          playerState[p.steam_id].marker = marker;
        }
      });

      // Remove players that went offline
      for (const id of Object.keys(playerState)) {
        if (!seen.has(id) && playerState[id].marker) {
          playerState[id].marker.remove();
          playerState[id].marker = null;
        }
      }

      updateSidebar(players);
      lastUpdate = new Date();
      const time = lastUpdate.toLocaleTimeString();
      setStatus('ok', `updated ${time}`);
    })
    .catch(err => {
      console.error(err);
      setStatus('error', 'failed – retrying');
    });
}

fetchPlayers();
setInterval(fetchPlayers, POLL_INTERVAL);
</script>
</body>
</html>
